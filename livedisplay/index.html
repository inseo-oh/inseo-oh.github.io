<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rinkai Line Display Mockup</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="display-container">
            <div class="left-panel">
                <div class="top-bar">
                    <div class="local-box">각역 정차</div>
                    <div class="destination-arrow">문&nbsp;&nbsp;산&nbsp;&nbsp;<span>행</span></div>
                </div>

                <div class="blue-line"></div>

                <div class="main-station-area">
                    <div class="station-badge">
                        <!-- <span class="next-stop-text">다음은 종점</span> -->
                        <svg width="7.5vw" height="7.5vw" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="45" fill="#0072bc" stroke="#fff" stroke-width="3" />
                            <circle cx="50" cy="50" r="38" fill="none" stroke="#00aeef" stroke-width="5" />
                            <text
                                x="50"
                                y="42"
                                font-family="Arial"
                                font-size="24"
                                font-weight="bold"
                                fill="#fff"
                                text-anchor="middle"
                            >
                                K
                            </text>
                            <text
                                x="50"
                                y="72"
                                font-family="Arial"
                                font-size="30"
                                font-weight="bold"
                                fill="#fff"
                                text-anchor="middle"
                            >
                                330
                            </text>
                        </svg>
                    </div>
                    <div class="station-name-main">금 릉</div>
                </div>
            </div>

            <div class="right-panel">
                <div class="jp-text">이쪽 문이 열립니다</div>

                <div class="graphic-container">
                    <svg class="svg-graphic" viewBox="0 0 400 120">
                        <line x1="0" y1="25" x2="330" y2="25" stroke="#b0c4de" stroke-width="1.5" />
                        <line x1="0" y1="95" x2="330" y2="95" stroke="#b0c4de" stroke-width="1.5" />

                        <g transform="translate(15, 25)">
                            <path
                                d="M 35 0 L 35 20 L 65 20 L 65 50 L 35 50 L 35 70 L 0 35 Z"
                                fill="#22b14c"
                                stroke="#005e1a"
                                stroke-width="1.5"
                            />
                        </g>

                        <g transform="translate(115, 15)">
                            <rect
                                x="0"
                                y="0"
                                width="45"
                                height="90"
                                fill="#f0f0f0"
                                stroke="#4d4d4d"
                                stroke-width="2"
                            />
                            <rect
                                x="5"
                                y="10"
                                width="35"
                                height="40"
                                rx="5"
                                fill="#cce6f5"
                                stroke="#4d4d4d"
                                stroke-width="1.5"
                            />
                            <rect x="40" y="0" width="5" height="90" fill="#ffc20e" />
                            <line x1="12" y1="20" x2="12" y2="40" stroke="#4d4d4d" stroke-width="2" />
                        </g>
                        <g transform="translate(162, 15)">
                            <rect
                                x="0"
                                y="0"
                                width="45"
                                height="90"
                                fill="#f0f0f0"
                                stroke="#4d4d4d"
                                stroke-width="2"
                            />
                            <rect
                                x="5"
                                y="10"
                                width="35"
                                height="40"
                                rx="5"
                                fill="#cce6f5"
                                stroke="#4d4d4d"
                                stroke-width="1.5"
                            />
                            <rect x="0" y="0" width="5" height="90" fill="#ffc20e" />
                        </g>

                        <g transform="translate(154, 65)">
                            <path
                                d="M 8 0 L 16 10 L 12 10 L 12 20 L 4 20 L 4 10 L 0 10 Z"
                                fill="#ff7f27"
                                stroke="#b95200"
                                stroke-width="1"
                            />
                        </g>

                        <g transform="translate(215, 25)">
                            <path
                                d="M 30 0 L 30 20 L 0 20 L 0 50 L 30 50 L 30 70 L 65 35 Z"
                                fill="#22b14c"
                                stroke="#005e1a"
                                stroke-width="1.5"
                            />
                        </g>

                        <g transform="translate(290, 10)">
                            <path
                                d="M 20 40 C 15 15, 55 10, 65 35 C 75 55, 65 80, 45 80 C 25 80, 20 60, 20 40 Z"
                                fill="#00a2e8"
                            />
                            <path
                                d="M 25 45 C 25 30, 50 25, 55 45 C 55 60, 45 75, 35 75 C 25 75, 25 60, 25 45 Z"
                                fill="#fff"
                            />
                            <circle cx="38" cy="35" r="5" fill="#000" />
                            <circle cx="36" cy="33" r="1.5" fill="#fff" />
                            <path
                                d="M 28 48 Q 33 55 38 48"
                                fill="none"
                                stroke="#e04040"
                                stroke-width="3"
                                stroke-linecap="round"
                            />
                            <path
                                d="M 22 35 C 10 30, 5 45, 15 50 Z"
                                fill="#00a2e8"
                                transform="rotate(-20 15 40)"
                            />
                            <path d="M 62 45 C 75 45, 80 55, 70 60 Z" fill="#00a2e8" />
                            <path d="M 45 78 C 50 88, 70 90, 65 75 Z" fill="#00a2e8" />

                            <path d="M 25 22 Q 45 10 58 25 Z" fill="#1c2b54" />
                            <ellipse cx="43" cy="24" rx="18" ry="4" fill="#000" />
                            <rect x="33" y="19" width="20" height="3" fill="#ffc20e" />
                        </g>
                    </svg>
                </div>

                <div class="en-text">Doors on this side will open.</div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
